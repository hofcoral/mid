name: Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump type to apply when version is empty
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Explicit version to release, for example 0.2.0
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-manual
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: |
          npm test
          npm run validate:content
          npm run lint

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump release version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            npm version "$INPUT_VERSION" -m "[chore] Release %s [skip ci]"
          else
            npm version "$INPUT_RELEASE_TYPE" -m "[chore] Release %s [skip ci]"
          fi

      - name: Publish to npm
        run: npm publish

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags
